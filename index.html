<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="assets/Logo.svg">
    <link rel="stylesheet" href="style.css">
    <title>To-Do List</title>
</head>
<body>
    <header class="site-header">
        <p class="title" ><span class="first-word">Dash</span><span class="second-word">board</span></p>
        <section class="search-section">
            <input type="text" placeholder="Search Your task here..." class="search-input">
            <button class="search-icon"><img src="assets/search.svg" alt="Search"></button>
        </section>
        <section class="notification-section">
            <button class="notification-icon"><img src="assets/notifications.svg" alt="Notifications"></button>
            <button class="calendar-icon"><img src="assets/calendar.svg" alt="Calendar"></button>
        </section>
        <section class="date-section">
            <div id="days"></div>
            <div id="date"></div>
        </section>
    </header>
    <main class="main-container">
        <section class="sidebar-left">
            <ul class="sidebar-menu">
                <li><a href="#"><img src="assets/dasboard.svg" alt="Dashboard" class="dashboard-icon">Dashboard</a></li>
                <li><a href="#"><img src="assets/tasks.svg" alt="Tasks" class="tasks-icon">My task</a></li>
                <li><a href="#"><img src="assets/category.svg" alt="Category" class="category-icon">Category</a></li>
                <li><a href="#"><img src="assets/setting.svg" alt="setting-icon">Settings</a></li>
                <li><a href="#"><img src="assets/help.svg" alt="help-icon">Help</a></li>
            </ul>
            <div class="logout-section">
                <button class="logout-button"><img src="assets/logout.svg" alt="Logout">Logout</button>
            </div>
        </section>

        <section class="sidebar-right">
            <div class="">
                <p class="title-right">Welcome to your To-Do List!</p>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
